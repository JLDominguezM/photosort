<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoSort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <span class="logo">PhotoSort</span>
        <a href="#gallery" class="nav-link active" data-page="gallery">Gallery</a>
        <a href="#search" class="nav-link" data-page="search">Search</a>
        <a href="#faces" class="nav-link" data-page="faces">Faces</a>
        <a href="#duplicates" class="nav-link" data-page="duplicates">Duplicates</a>
        <a href="#settings" class="nav-link" data-page="settings">Settings</a>
    </nav>

    <div class="container" id="app"></div>

    <!-- Photo detail modal -->
    <div class="modal-overlay" id="photo-modal">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-title"></span>
                <button class="btn btn-sm" onclick="closeModal()">&times; Close</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
